<html>
    <head>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    </head>
    <body>
        <div class="container">
            <div class="card">
                <!-- Cabeçalho e título do RPG -->
                <div class="card-header text-center">
                    Nome do RPG - Criado por Joab
                </div>
                <!-- Tela Central do Jogo -->
                <div class="card-body"
                style= "background-image:url('assets/background.webp');"
                background- size: cover;">
                    <div class="row">
                        <!-- Status do Herói -->
                        <div class="col">
                            <ul class="list-group float-end text-center" style="width: 225px">
                                <li class="list-group-item">Link</li>
                                <li class="list-group-item">Herói do Tempo</li>
                                <li class="list-group-item">
                                    ❤️
                                    <progress value="100" max="100" style="accent-color: red;"></progress>
                                </li>
                                <li class="list-group-item">
                                    🧪
                                    <progress  value="100" max="100"></progress>
                                </li>
                                <li class="list-group-item">
                                    ⚡
                                    <progress  value="0" max="100" style="accent-color: orange;"></progress>
                                </li>
                            </ul>
                        </div>
                        <!-- Status do Chefe -->
                        <div class="col">
                            <ul class="list-group float-start text-center" style="width: 225px">
                                <li class="list-group-item">Link</li>
                                <li class="list-group-item">Herói do Tempo</li>
                                <li class="list-group-item">
                                    ❤️
                                    <progress value="100" max="100" style="accent-color: red;"></progress>
                                </li>
                                <li class="list-group-item">
                                    🧪
                                    <progress  value="100" max="100"></progress>
                                </li>
                                <li class="list-group-item">
                                    ⚡
                                    <progress  value="0" max="100" style="accent-color: orange;"></progress>
                                </li>
                            </ul>
                        </div>
                    </div> <!-- fim do row -->
                    <div class="row">
                         <!-- IMG BOSS -->
                         <div class="col text-end">
                            <img src="assets/2595.gif" width="400" height="400">
                         </div>
                         <!-- IMG HERO -->
                         <div class="col text-start">
                            <img src="assets/e0fecc7bff04bea3213fca2350289e03.gif" width="400" height="400">
                         </div>
                    </div>
                </div>
                <div class="card-footer"></div>
            </div> <!-- fechamento do card -->
        </div> <!-- fechamento do container -->
    </body>
</html>
