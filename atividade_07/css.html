<html>
<head>
<style>
    body {
        background-color: aquamarine;
    }

    h1 {
        color: darkblue;
    }

    p {
        font-size: 16px;
    }

    ul {
        background-color: white;
        padding: 10px;
        width: 200px;
    }

    li {
        margin-bottom: 5px;
    }

    #botoes {
        margin-top: 15px;
    }

    button {
        border: none;
        padding: 10px 15px;
        margin-right: 10px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 14px;
        color: white;
    }

    /* Botão Comprar */
    .comprar {
        background-color: green;
    }

    .comprar:hover {
        background-color: darkgreen;
    }

    /* Botão Adicionar */
    .adicionar {
        background-color: blue;
    }

    .adicionar:hover {
        background-color: darkblue;
    }

    button:active {
        transform: scale(0.95);
    }
</style>
</head>

<body>
    <h1>Minha pagina web</h1>
    <img src="ultra_ego.png" width="250px" height="250px"/>
   
    <p>Este e um paragrafo novo</p>

    <p id="bemvindo">Bem vindo ao Senai</p>

    <h2>Lista de compras</h2>

    <ul>
        <li>Salmão</li>
        <li>Carne</li>
        <li>Arroz</li>
        <li>Feijão</li>
        <li>Leite</li>
    </ul>

    <p>Fim da lista</p>

    <div id="botoes">
        <button class="comprar">Comprar</button>
        <button class="adicionar">Adicionar Item</button>
    </div>
</body>
</html>
